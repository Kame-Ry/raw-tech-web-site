<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30">
      <circle cx="15" cy="15" r="1" fill="#e8a04022"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#dots)"/>

  <line x1="100" y1="100" x2="700" y2="100" stroke="#e8a04044" stroke-width="1"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="#e8a04044" stroke-width="1"/>

  <text x="400" y="135" font-family="'Courier New', monospace" font-size="14" letter-spacing="6" fill="#e8a040" text-anchor="middle">PHILOSOPHY</text>

  <text x="400" y="190" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Cook With</text>
  <text x="400" y="234" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Your Senses</text>

  <!-- Five sense icons -->
  <text x="260" y="275" font-size="24" text-anchor="middle">👁️</text>
  <text x="330" y="275" font-size="24" text-anchor="middle">👂</text>
  <text x="400" y="275" font-size="24" text-anchor="middle">👃</text>
  <text x="470" y="275" font-size="24" text-anchor="middle">✋</text>
  <text x="540" y="275" font-size="24" text-anchor="middle">👅</text>

  <line x1="40" y1="40" x2="80" y2="40" stroke="#e8a040" stroke-width="2"/>
  <line x1="40" y1="40" x2="40" y2="80" stroke="#e8a040" stroke-width="2"/>
  <line x1="720" y1="40" x2="760" y2="40" stroke="#e8a040" stroke-width="2"/>
  <line x1="760" y1="40" x2="760" y2="80" stroke="#e8a040" stroke-width="2"/>
  <line x1="40" y1="360" x2="80" y2="360" stroke="#e8a040" stroke-width="2"/>
  <line x1="40" y1="320" x2="40" y2="360" stroke="#e8a040" stroke-width="2"/>
  <line x1="720" y1="360" x2="760" y2="360" stroke="#e8a040" stroke-width="2"/>
  <line x1="760" y1="320" x2="760" y2="360" stroke="#e8a040" stroke-width="2"/>

  <text x="400" y="340" font-family="'Courier New', monospace" font-size="10" letter-spacing="3" fill="#e8a04088" text-anchor="middle">RAW-TECH.CO.UK</text>
</svg>
