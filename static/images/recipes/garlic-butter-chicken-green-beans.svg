<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5016CC;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30">
      <circle cx="15" cy="15" r="1" fill="#D4A84322"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#dots)"/>
  
  <!-- Decorative lines -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#D4A84344" stroke-width="1"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="#D4A84344" stroke-width="1"/>
  
  <!-- Cuisine label -->
  <text x="400" y="135" font-family="'Courier New', monospace" font-size="14" letter-spacing="6" fill="#D4A843" text-anchor="middle">ITALIAN</text>
  
  <!-- Recipe title -->
    <text x="400" y="178" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Lemon Garlic Butter</text>
    <text x="400" y="222" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Chicken</text>

  <!-- Icon -->
  <text x="400" y="275" font-size="36" text-anchor="middle">🍗</text>
  
  <!-- Corner accents -->
  <line x1="40" y1="40" x2="80" y2="40" stroke="#D4A843" stroke-width="2"/>
  <line x1="40" y1="40" x2="40" y2="80" stroke="#D4A843" stroke-width="2"/>
  <line x1="720" y1="40" x2="760" y2="40" stroke="#D4A843" stroke-width="2"/>
  <line x1="760" y1="40" x2="760" y2="80" stroke="#D4A843" stroke-width="2"/>
  <line x1="40" y1="360" x2="80" y2="360" stroke="#D4A843" stroke-width="2"/>
  <line x1="40" y1="320" x2="40" y2="360" stroke="#D4A843" stroke-width="2"/>
  <line x1="720" y1="360" x2="760" y2="360" stroke="#D4A843" stroke-width="2"/>
  <line x1="760" y1="320" x2="760" y2="360" stroke="#D4A843" stroke-width="2"/>
  
  <!-- Footer -->
  <text x="400" y="340" font-family="'Courier New', monospace" font-size="10" letter-spacing="3" fill="#E8D5A388" text-anchor="middle">RAW-TECH.CO.UK</text>
</svg>