baseURL: "https://raw-tech.co.uk/"
title: "RAW-TECH"
theme: "PaperMod"
defaultContentLanguage: en
enableRobotsTXT: true

pagination:
  pagerSize: 10

taxonomies:
  tag: "tags"

params:
  description: "Ryan Witts — IT technician, homelab builder, and writer on tech, film, and the outdoors."
  author: "Ryan Witts"

  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowWordCount: false
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowToc: true
  ShowPostNavLinks: true

  ShowPostCover: true
  ShowPostCoverInList: true
  ShowPostCoverInSingle: true

  showRecent: true
  homePostsSection: posts
  recentPostsLimit: 5

  assets:
    favicon: "/favicon.ico"
    disableFingerprinting: true

  socialIcons:
    - name: github
      url: "https://github.com/Kame-Ry"
    - name: linkedin
      url: "https://www.linkedin.com/in/ryan-witts-72993a181/"

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 1
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 2
    - identifier: ai-home
      name: AI Home
      url: /ai-home/
      weight: 3
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 4

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: monokai